{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Account Settings</h2>
  <a href="{{ url_for('coordinator.dashboard') }}"
     class="btn btn-outline-dark btn-sm">Back to Dashboard</a>
</div>
<div class="row g-4">

  <div class="col-md-5">
    <div class="card">
      <div class="card-header bg-dark text-white">Change Email</div>
      <div class="card-body">
        <p class="text-muted small mb-3">
          Current email: <strong>{{ current_user.email }}</strong>
        </p>
        <form method="POST">
          <input type="hidden" name="action" value="change_email">
          <div class="mb-3">
            <label class="form-label">New Email Address</label>
            <input type="email" name="new_email"
                   class="form-control" required>
          </div>
          <button type="submit" class="btn btn-dark w-100">
            Update Email
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-5">
    <div class="card">
      <div class="card-header bg-dark text-white">Change Password</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="action" value="change_password">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password"
                   class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password"
                   class="form-control" minlength="8" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password"
                   class="form-control" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-dark w-100">
            Update Password
          </button>
        </form>
      </div>
    </div>
  </div>

</div>
{% endblock %}
