{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Add New Company</h2>
  <a href="{{ url_for('admin.dashboard') }}"
     class="btn btn-outline-dark btn-sm">Back</a>
</div>

<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.new_company') }}">

          <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="name" class="form-control"
                   placeholder="e.g. Telkom SA" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Industry</label>
            <input type="text" name="industry" class="form-control"
                   placeholder="e.g. Information Technology">
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control"
                   placeholder="e.g. Durban, KZN">
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Email</label>
            <input type="text" name="contact" class="form-control"
                   placeholder="hr@company.co.za">
          </div>
          <div class="mb-3">
            <label class="form-label">Website</label>
            <input type="text" name="website" class="form-control"
                   placeholder="https://www.company.co.za">
          </div>

          <button type="submit" class="btn btn-dark w-100">
            Add Company
          </button>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
