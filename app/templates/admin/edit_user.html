{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Edit User</h2>
  <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-dark btn-sm">Back</a>
</div>
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ user.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control"
                   value="{{ user.email }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-select" required>
              <option value="student"
                {{ 'selected' if user.role == 'student' }}>Student</option>
              <option value="coordinator"
                {{ 'selected' if user.role == 'coordinator' }}>Coordinator</option>
              <option value="admin"
                {{ 'selected' if user.role == 'admin' }}>Admin</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Student Number
              <span class="text-muted fw-normal">(students only)</span>
            </label>
            <input type="text" name="student_num" class="form-control"
                   value="{{ user.student_num or '' }}">
          </div>
          <button type="submit" class="btn btn-dark w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
