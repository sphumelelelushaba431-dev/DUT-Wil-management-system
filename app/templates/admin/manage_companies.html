{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Manage Companies</h2>
  <div class="d-flex gap-2">
    <a href="{{ url_for('admin.new_company') }}" class="btn btn-dark btn-sm">Add New Company</a>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-dark btn-sm">Back</a>
  </div>
</div>
<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Industry</th>
        <th>Location</th>
        <th>Contact</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for c in companies %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.industry or '—' }}</td>
        <td>{{ c.location or '—' }}</td>
        <td>{{ c.contact or '—' }}</td>
        <td>
          <a href="{{ url_for('admin.edit_company', company_id=c.id) }}"
             class="btn btn-sm btn-outline-dark">Edit</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
