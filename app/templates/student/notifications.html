{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Notifications</h2>
  <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-dark btn-sm">
    Back to Dashboard
  </a>
</div>

{% if notifs %}
  {% for n in notifs %}
    <div class="card mb-2 {{ 'border-primary' if not n.is_read else '' }}">
      <div class="card-body py-2">
        <p class="mb-1">{{ n.message }}</p>
        <small class="text-muted">
          {{ n.created_at.strftime('%d %b %Y at %H:%M') }}
        </small>
      </div>
    </div>
  {% endfor %}
{% else %}
  <div class="alert alert-info">You have no notifications yet.</div>
{% endif %}

{% endblock %}
